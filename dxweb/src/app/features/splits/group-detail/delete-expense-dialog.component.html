<h2 mat-dialog-title>Delete expense?</h2>

<mat-dialog-content class="de-body">
  <p>
    Are you sure you want to delete
    <strong *ngIf="data.description">"{{ data.description }}"</strong>?
  </p>
  <p class="de-warn"><strong>This cannot be undone.</strong></p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-raised-button color="warn" type="button" (click)="confirm()">Delete</button>
</mat-dialog-actions>
