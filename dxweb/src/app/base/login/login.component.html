<div class="auth-page">
  <div class="auth-card-wrapper">
    <mat-card class="auth-card">
      <mat-card-content>
        <div class="auth-header">
          <mat-icon class="auth-logo">lock</mat-icon>
          <h1 class="auth-title">Sign in</h1>
          <p class="auth-subtitle">Use your email and password to continue</p>
        </div>

        <form (ngSubmit)="login()" class="auth-form">
          <mat-form-field appearance="outline" class="auth-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="username" name="username" placeholder="you@example.com" required />
            <mat-icon matSuffix>mail_outline</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="auth-field">
            <mat-label>Password</mat-label>
            <input matInput type="password" [(ngModel)]="password" name="password" placeholder="••••••••" minlength="6" required />
            <mat-icon matSuffix>lock_outline</mat-icon>
          </mat-form-field>

          <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <button mat-raised-button color="primary" type="submit" class="auth-submit" [disabled]="!username.trim() || !password">
            Sign in
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account?
          <a routerLink="/register" class="auth-link">Create account</a>
        </p>
        <p class="auth-debug">API: {{ authService.apiBaseUrl }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
