<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="side" [class.mat-elevation-z4]="true" class="app-sidenav">
    <mat-nav-list>
      <mat-list-item routerLink="/login">
        <mat-icon>dashboard</mat-icon><span>Dashboard</span>
      </mat-list-item>
      <mat-list-item routerLink="/user">
        <mat-icon>people</mat-icon><span>User</span>
      </mat-list-item>
      <mat-list-item routerLink="/products">
        <mat-icon>category</mat-icon><span>Product</span>
      </mat-list-item>
      <mat-list-item routerLink="/sales">
        <mat-icon>shopping_cart</mat-icon><span>Sales</span>
      </mat-list-item>
      <mat-list-item routerLink="/register">
        <mat-icon>person_add</mat-icon><span>Register</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
