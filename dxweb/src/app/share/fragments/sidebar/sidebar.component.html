<mat-sidenav-container
  class="sidenav-container"
  [style.marginTop.px]="mobileQuery.matches ? headerOffset : 0"
>
  <mat-sidenav
    #snav
    [mode]="mobileQuery.matches ? 'over' : 'side'"
    [fixedInViewport]="mobileQuery.matches"
    [fixedTopGap]="mobileQuery.matches ? headerOffset : 0"
    [opened]="!mobileQuery.matches"
    class="sidenav"
  >
    <nav class="nav" aria-label="Workspace">
      <p class="nav-section-label">Workspace</p>
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a
        mat-list-item
        routerLink="/groups"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>groups</mat-icon>
        <span>Groups</span>
      </a>
      <a
        mat-list-item
        routerLink="/groups/new"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>add_circle</mat-icon>
        <span>Create group</span>
      </a>
    </nav>
  </mat-sidenav>
  <mat-sidenav-content class="sidenav-content-placeholder">
    <!-- Routed content lives in main-shell -->
  </mat-sidenav-content>
</mat-sidenav-container>
