<mat-sidenav-container class="sidenav-container" [style.marginTop.px]="mobileQuery.matches ? 56 : 0">
  <mat-sidenav
    #snav
    [mode]="mobileQuery.matches ? 'over' : 'side'"
    [fixedInViewport]="mobileQuery.matches"
    [fixedTopGap]="mobileQuery.matches ? 56 : 0"
    [opened]="!mobileQuery.matches"
    class="sidenav"
  >
    <nav class="nav">
      <a
        mat-list-item
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a
        mat-list-item
        routerLink="/user"
        routerLinkActive="active"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>people</mat-icon>
        <span>Users</span>
      </a>
      <a
        mat-list-item
        routerLink="/products"
        routerLinkActive="active"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>inventory_2</mat-icon>
        <span>Products</span>
      </a>
      <a
        mat-list-item
        routerLink="/sales"
        routerLinkActive="active"
        (click)="mobileQuery.matches && snav.close()"
      >
        <mat-icon mat-list-icon>point_of_sale</mat-icon>
        <span>Sales</span>
      </a>
    </nav>
  </mat-sidenav>
  <mat-sidenav-content class="sidenav-content-placeholder">
    <!-- Main content is in main-shell -->
  </mat-sidenav-content>
</mat-sidenav-container>
