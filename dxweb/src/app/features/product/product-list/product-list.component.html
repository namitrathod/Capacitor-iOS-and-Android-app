<div class="list-page">
  <header class="list-page-header">
    <h1 class="list-page-title">Products</h1>
    <button mat-raised-button color="primary" routerLink="/products/add">
      <mat-icon>add</mat-icon> Create
    </button>
  </header>
  <div class="page-loading" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
  <mat-card class="list-card" *ngIf="!loading">
    <mat-table *ngIf="products.length > 0" [dataSource]="products" class="list-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let row">{{ row.title }}</td>
      </ng-container>
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['id', 'title', 'description']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['id', 'title', 'description']"></tr>
    </mat-table>
    <div class="empty-state" *ngIf="products.length === 0">
      <mat-icon>inventory_2</mat-icon>
      <p>No products yet</p>
      <p class="empty-hint">Click <strong>Create</strong> to add a product.</p>
    </div>
  </mat-card>
</div>
