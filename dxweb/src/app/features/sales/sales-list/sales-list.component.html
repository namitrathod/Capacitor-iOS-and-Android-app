<div class="list-page">
  <header class="list-page-header">
    <h1 class="list-page-title">Sales</h1>
    <button mat-raised-button color="primary" routerLink="/sales/add">
      <mat-icon>add</mat-icon> Create
    </button>
  </header>
  <div class="page-loading" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
  <mat-card class="list-card" *ngIf="!loading">
    <mat-table *ngIf="sales.length > 0" [dataSource]="sales" class="list-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>
      <ng-container matColumnDef="user_id">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let row">{{ row.user_id }}</td>
      </ng-container>
      <ng-container matColumnDef="product_id">
        <th mat-header-cell *matHeaderCellDef>Product</th>
        <td mat-cell *matCellDef="let row">{{ row.product_id }}</td>
      </ng-container>
      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef>Qty</th>
        <td mat-cell *matCellDef="let row">{{ row.quantity }}</td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let row">{{ row.price | number: '1.2-2' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="['id', 'user_id', 'product_id', 'quantity', 'price']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['id', 'user_id', 'product_id', 'quantity', 'price']"></tr>
    </mat-table>
    <div class="empty-state" *ngIf="sales.length === 0">
      <mat-icon>point_of_sale</mat-icon>
      <p>No sales yet</p>
      <p class="empty-hint">Click <strong>Create</strong> to add a sale.</p>
    </div>
  </mat-card>
</div>
