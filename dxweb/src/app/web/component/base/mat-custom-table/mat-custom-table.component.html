<div class="table-toolbar">
  <button mat-raised-button color="primary" (click)="onCreate()">
    <mat-icon>add</mat-icon> Create
  </button>
  <mat-form-field class="table-search" appearance="outline">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name or email..." />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
</div>

<mat-card class="table-card">
  <mat-table *ngIf="dataSource.data.length > 0" #table [dataSource]="dataSource" class="data-table" matSort>
    <ng-container matColumnDef="select">
      <mat-header-cell *matHeaderCellDef>
        <mat-checkbox color="primary" (change)="$event ? masterToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()" [indeterminate]="selection.hasValue() && !isAllSelected()">
        </mat-checkbox>
      </mat-header-cell>
      <mat-cell *cdkCellDef="let row">
        <mat-checkbox color="primary" (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(row) : null"
          [checked]="selection.isSelected(row)">
        </mat-checkbox>
      </mat-cell>
    </ng-container>
    <ng-container *ngFor="let column of columns" [matColumnDef]="column.columnDef">
      <mat-header-cell *cdkHeaderCellDef mat-sort-header>{{ column.header }}</mat-header-cell>
      <mat-cell *cdkCellDef="let row">{{ row[column.columnDef] }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="action">
      <mat-header-cell *matHeaderCellDef>Action</mat-header-cell>
      <mat-cell *cdkCellDef="let element" action-buttons [value]="element" (buttonAction)="onTableAction($event)">
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>
  <div class="empty-state" *ngIf="dataSource.data.length === 0">
    <mat-icon>people_outline</mat-icon>
    <p>No users yet</p>
    <p class="empty-hint">Click <strong>Create</strong> to add a new user.</p>
  </div>
  <mat-paginator *ngIf="dataSource.data.length > 0" [pageSizeOptions]="[10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
</mat-card>
