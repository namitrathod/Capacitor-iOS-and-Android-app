workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: 20
      cocoapods: default
      vars:
        APP_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          cd dxweb
          npm ci
      - name: Build web
        script: |
          cd dxweb
          npm run build
      - name: Sync iOS
        script: |
          cd dxweb
          npx cap sync ios
      - name: Install Pods
        script: |
          cd dxweb/ios/App
          pod install
      - name: Build iOS simulator app
        script: |
          cd dxweb/ios/App
          xcodebuild -workspace App.xcworkspace -scheme "$APP_SCHEME" -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build