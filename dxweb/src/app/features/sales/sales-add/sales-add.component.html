<div class="page-container">
  <header class="page-header">
    <h1 class="page-title">New sale</h1>
  </header>
  <mat-card class="form-card">
    <mat-card-content>
      <form (ngSubmit)="submit()" class="entity-form">
        <mat-form-field appearance="outline">
          <mat-label>User</mat-label>
          <mat-select [(ngModel)]="user_id" name="user_id" required>
            <mat-option *ngFor="let u of users" [value]="u.id">{{ u.email }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Product</mat-label>
          <mat-select [(ngModel)]="product_id" name="product_id" required>
            <mat-option *ngFor="let p of products" [value]="p.id">{{ p.title }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" min="1" [(ngModel)]="quantity" name="quantity" required />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Price</mat-label>
          <input matInput type="number" min="0" step="0.01" [(ngModel)]="price" name="price" required />
        </mat-form-field>
        <p *ngIf="error" class="form-error">{{ error }}</p>
        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit">Create</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
