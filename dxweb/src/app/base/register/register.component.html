<div class="auth-page">
  <div class="auth-card-wrapper">
    <mat-card class="auth-card">
      <mat-card-content>
        <div class="auth-header">
          <mat-icon class="auth-logo">person_add</mat-icon>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Register with your email and password</p>
        </div>

        <form (ngSubmit)="register()" class="auth-form">
          <mat-form-field appearance="outline" class="auth-field">
            <mat-label>Full name</mat-label>
            <input matInput type="text" [(ngModel)]="username" name="username" placeholder="Your name" />
            <mat-icon matSuffix>person_outline</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="auth-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" required />
            <mat-icon matSuffix>mail_outline</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline" class="auth-field">
            <mat-label>Password</mat-label>
            <input matInput type="password" [(ngModel)]="password" name="password" placeholder="••••••••" minlength="6" required />
            <mat-icon matSuffix>lock_outline</mat-icon>
          </mat-form-field>

          <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>

          <button mat-raised-button color="primary" type="submit" class="auth-submit" [disabled]="!email.trim() || !password">
            Create account
          </button>
        </form>

        <p class="auth-footer">
          Already have an account?
          <a routerLink="/login" class="auth-link">Sign in</a>
        </p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
