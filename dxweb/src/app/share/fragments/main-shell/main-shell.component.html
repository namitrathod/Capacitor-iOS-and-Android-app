<!-- Logged-in shell: app chrome + sidebar + content -->
<div class="main-layout" *ngIf="showSidebar">
  <header class="top-bar">
    <a routerLink="/groups" class="top-bar-brand">
      <div class="top-bar-brand-mark" aria-hidden="true">SK</div>
      <div class="top-bar-brand-text">
        <span class="top-bar-brand-name">SplitKit</span>
        <span class="top-bar-brand-env">Expense groups</span>
      </div>
    </a>
  </header>
  <div class="main-row">
    <main class="main-content" id="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <nav class="mobile-tabbar" aria-label="Primary">
    <a
      routerLink="/friends"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="mobile-tabbar__item"
    >
      <mat-icon>person_outline</mat-icon>
      <span>Friends</span>
    </a>
    <a
      routerLink="/groups"
      routerLinkActive="is-active"
      class="mobile-tabbar__item"
    >
      <mat-icon>groups</mat-icon>
      <span>Groups</span>
    </a>
    <a
      routerLink="/activity"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="mobile-tabbar__item"
    >
      <mat-icon>monitoring</mat-icon>
      <span>Activity</span>
    </a>
    <a
      routerLink="/account"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="mobile-tabbar__item"
    >
      <mat-icon>pie_chart</mat-icon>
      <span>Account</span>
    </a>
  </nav>
</div>
<router-outlet *ngIf="!showSidebar"></router-outlet>
